services:
  - type: web
    name: portfoliovault-api
    env: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: DB_PATH
        value: /var/data/portfolio.db
      - key: UPLOAD_DIR
        value: /var/data/uploads
    disk:
      name: portfolio-data
      mountPath: /var/data
      sizeGB: 1
