<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PortfolioVault — Your Digital Identity</title>
  <meta name="description" content="Secure portfolio platform. Showcase skills, certifications, and projects with full privacy control." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    #root-loader {
      position: fixed; inset: 0;
      background: #060608;
      display: flex; align-items: center; justify-content: center;
      z-index: 9999;
      flex-direction: column; gap: 1.5rem;
    }
    .rl-logo {
      font-family: 'Syne', sans-serif;
      font-size: 1.4rem; font-weight: 800;
      letter-spacing: 0.3em;
      color: #c9a84c;
      animation: rl-pulse 1.6s ease-in-out infinite;
    }
    .rl-bar { width: 180px; height: 1px; background: #1e1e2e; overflow: hidden; }
    .rl-fill { height: 100%; background: linear-gradient(90deg, #c9a84c, #e85d26); animation: rl-load 1.8s ease-in-out forwards; }
    @keyframes rl-pulse { 0%,100%{opacity:.3} 50%{opacity:1} }
    @keyframes rl-load { from{width:0} to{width:100%} }
  </style>
</head>
<body>
  <div id="root-loader">
    <div class="rl-logo">PORTFOLIOVAULT</div>
    <div class="rl-bar"><div class="rl-fill"></div></div>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
